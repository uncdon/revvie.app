<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed - Revvie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f8f8f8; }
    .logo-text { font-family: 'Young Serif', serif; color: #07B5F5; }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full text-center">

      <h1 class="logo-text text-3xl mb-6">*revvie</h1>

      <div class="text-6xl mb-6">✅</div>

      <h2 class="text-2xl font-bold text-gray-900 mb-4">
        You've been unsubscribed
      </h2>

      <p class="text-gray-600 mb-4">
        <strong>{{ customer_email }}</strong> will no longer receive
        review request emails from <strong>{{ business_name }}</strong>.
      </p>

      <p class="text-sm text-gray-500">
        Changed your mind? Contact {{ business_name }} directly
        to resubscribe.
      </p>

    </div>
  </div>
</body>
</html>
