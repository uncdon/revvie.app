<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{ subject }}</title>
  <!-- Young Serif: loads in Apple Mail, iOS Mail, Samsung Mail, Thunderbird.
       Gmail/Outlook ignore @import and fall back to Georgia (close enough). -->
  <style type="text/css">
    @import url('https://fonts.googleapis.com/css2?family=Young+Serif&display=swap');
  </style>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f8f8f8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, Helvetica, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f8f8f8;">
    <tr>
      <td align="center" style="padding: 40px 20px;">

        <!-- Main container: 600px wide card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

          <!-- ================================================================
               HEADER: logo
               ================================================================ -->
          <tr>
            <td style="padding: 32px 40px 28px 40px; border-bottom: 1px solid #e5e7eb;">
              <h1 style="margin: 0; font-family: 'Young Serif', Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 400; color: #07B5F5; letter-spacing: -0.5px;">
                *revvie
              </h1>
            </td>
          </tr>

          <!-- ================================================================
               BODY: injected per-email content
               ================================================================ -->
          <tr>
            <td style="padding: 36px 40px 32px 40px; font-size: 15px; line-height: 24px; color: #374151;">
              {{ content }}
            </td>
          </tr>

          <!-- ================================================================
               FOOTER
               ================================================================ -->
          <tr>
            <td style="padding: 24px 40px; border-top: 1px solid #e5e7eb; background-color: #f9fafb; border-radius: 0 0 12px 12px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="font-size: 12px; color: #9ca3af; line-height: 20px;">
                    {{ footer_content }}
                    <br>
                    *revvie &middot; Las Vegas, NV &middot;
                    <a href="https://revvie.app" style="color: #07B5F5; text-decoration: none;">revvie.app</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /Main container -->

      </td>
    </tr>
  </table>
  <!-- /Outer wrapper -->

</body>
</html>
