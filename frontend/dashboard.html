<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Revvie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-100%); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-100%); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .slide-down {
            animation: slideDown 0.3s ease-out forwards;
        }
        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
        .skeleton {
            animation: pulse 1.5s ease-in-out infinite;
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- ============================================== -->
    <!-- TOAST CONTAINER                               -->
    <!-- Notifications appear here                     -->
    <!-- ============================================== -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- ============================================== -->
    <!-- HEADER / NAVIGATION BAR                       -->
    <!-- ============================================== -->
    <nav class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <!-- Left: Logo -->
                <h1 class="text-2xl font-bold text-teal-600">Revvie</h1>

                <!-- Center: Business Name -->
                <span id="headerBusinessName" class="hidden md:block text-lg font-semibold text-gray-700">
                    <span class="skeleton rounded h-6 w-32 inline-block"></span>
                </span>

                <!-- Right: Logout Button -->
                <button
                    id="logoutBtn"
                    class="text-gray-500 hover:text-red-600 font-medium transition-colors duration-200 flex items-center gap-1"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    Logout
                </button>
            </div>

            <!-- Business name on mobile -->
            <div id="mobileBusinessName" class="md:hidden text-center mt-2 text-gray-700 font-medium">
                <span class="skeleton rounded h-5 w-24 inline-block"></span>
            </div>
        </div>
    </nav>

    <!-- ============================================== -->
    <!-- MAIN CONTENT AREA                             -->
    <!-- ============================================== -->
    <main class="max-w-6xl mx-auto px-4 py-8">

        <!-- ========================================== -->
        <!-- STATS CARDS                               -->
        <!-- ========================================== -->
        <div id="statsSection" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

            <!-- Skeleton loaders for stats (shown initially) -->
            <div id="statsSkeleton" class="contents">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="skeleton rounded h-10 w-16 mb-2"></div>
                    <div class="skeleton rounded h-4 w-24"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="skeleton rounded h-10 w-16 mb-2"></div>
                    <div class="skeleton rounded h-4 w-24"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="skeleton rounded h-10 w-16 mb-2"></div>
                    <div class="skeleton rounded h-4 w-24"></div>
                </div>
            </div>

            <!-- Actual stats cards (hidden initially) -->
            <div id="statsContent" class="contents hidden">
                <!-- Card 1: Requests Sent -->
                <div class="bg-gradient-to-br from-teal-500 to-teal-600 rounded-2xl shadow-lg p-6 text-white fade-in">
                    <div class="flex items-center justify-between">
                        <div>
                            <p id="statRequestsSent" class="text-4xl font-bold">0</p>
                            <p class="text-teal-100 mt-1 text-sm font-medium">Requests Sent</p>
                        </div>
                        <div class="text-4xl opacity-80">&#128231;</div>
                    </div>
                </div>

                <!-- Card 2: Reviews Received -->
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl shadow-lg p-6 text-white fade-in" style="animation-delay: 0.1s;">
                    <div class="flex items-center justify-between">
                        <div>
                            <p id="statReviewsReceived" class="text-4xl font-bold">0</p>
                            <p class="text-blue-100 mt-1 text-sm font-medium">Reviews Received</p>
                        </div>
                        <div class="text-4xl opacity-80">&#11088;</div>
                    </div>
                </div>

                <!-- Card 3: Conversion Rate -->
                <div class="bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl shadow-lg p-6 text-white fade-in" style="animation-delay: 0.2s;">
                    <div class="flex items-center justify-between">
                        <div>
                            <p id="statConversionRate" class="text-4xl font-bold">0%</p>
                            <p class="text-indigo-100 mt-1 text-sm font-medium">Conversion Rate</p>
                        </div>
                        <div class="text-4xl opacity-80">&#128202;</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- SEND REVIEW REQUEST CARD                  -->
        <!-- ========================================== -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <svg class="w-6 h-6 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                Send Review Request
            </h2>

            <form id="reviewRequestForm" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <!-- Customer Name Input -->
                    <div>
                        <label for="customerName" class="block text-sm font-semibold text-gray-700 mb-2">
                            Customer Name <span class="text-red-400">*</span>
                        </label>
                        <input
                            type="text"
                            id="customerName"
                            name="customerName"
                            required
                            placeholder="e.g., John Smith"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                        >
                        <p id="nameError" class="hidden text-red-500 text-sm mt-1.5 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                            </svg>
                            <span></span>
                        </p>
                    </div>

                    <!-- Customer Email Input -->
                    <div>
                        <label for="customerEmail" class="block text-sm font-semibold text-gray-700 mb-2">
                            Customer Email <span class="text-red-400">*</span>
                        </label>
                        <input
                            type="email"
                            id="customerEmail"
                            name="customerEmail"
                            required
                            placeholder="e.g., john@example.com"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                        >
                        <p id="emailError" class="hidden text-red-500 text-sm mt-1.5 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                            </svg>
                            <span></span>
                        </p>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button
                        type="submit"
                        id="sendRequestBtn"
                        class="w-full md:w-auto px-8 py-3.5 bg-teal-600 text-white font-semibold rounded-xl hover:bg-teal-700 hover:shadow-lg hover:shadow-teal-500/25 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:shadow-none"
                    >
                        <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                        <span id="btnText">Send Review Request</span>
                        <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- ========================================== -->
        <!-- RECENT REVIEW REQUESTS TABLE              -->
        <!-- ========================================== -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <svg class="w-6 h-6 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
                Recent Review Requests
            </h2>

            <!-- Table Skeleton (shown while loading) -->
            <div id="tableSkeleton" class="space-y-3">
                <div class="skeleton rounded h-12 w-full"></div>
                <div class="skeleton rounded h-12 w-full"></div>
                <div class="skeleton rounded h-12 w-full"></div>
            </div>

            <!-- Table Content (hidden initially) -->
            <div id="tableContent" class="hidden">
                <!-- Table container with horizontal scroll on mobile -->
                <div class="overflow-x-auto -mx-6 md:mx-0">
                    <table class="w-full min-w-[600px]">
                        <thead>
                            <tr class="border-b-2 border-gray-100">
                                <th class="text-left py-3 px-4 md:px-6 font-semibold text-gray-500 text-sm uppercase tracking-wider">Customer</th>
                                <th class="text-left py-3 px-4 md:px-6 font-semibold text-gray-500 text-sm uppercase tracking-wider">Email</th>
                                <th class="text-left py-3 px-4 md:px-6 font-semibold text-gray-500 text-sm uppercase tracking-wider">Date Sent</th>
                                <th class="text-left py-3 px-4 md:px-6 font-semibold text-gray-500 text-sm uppercase tracking-wider">Status</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Empty State (hidden initially) -->
            <div id="emptyState" class="hidden text-center py-12">
                <div class="text-6xl mb-4">&#128237;</div>
                <h3 class="text-xl font-semibold text-gray-700 mb-2">No review requests yet</h3>
                <p class="text-gray-500">Send your first review request using the form above!</p>
            </div>
        </div>

    </main>

    <!-- ============================================== -->
    <!-- JAVASCRIPT                                    -->
    <!-- ============================================== -->
    <script>
        // =====================================================
        // CONFIGURATION
        // =====================================================
        const API_URL = 'http://localhost:5001/api';

        // =====================================================
        // AUTHENTICATION CHECK
        // =====================================================
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // =====================================================
        // ELEMENT REFERENCES
        // =====================================================
        const headerBusinessName = document.getElementById('headerBusinessName');
        const mobileBusinessName = document.getElementById('mobileBusinessName');
        const reviewRequestForm = document.getElementById('reviewRequestForm');
        const customerNameInput = document.getElementById('customerName');
        const customerEmailInput = document.getElementById('customerEmail');
        const sendRequestBtn = document.getElementById('sendRequestBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnSpinner = document.getElementById('btnSpinner');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');
        const requestsTableBody = document.getElementById('requestsTableBody');
        const logoutBtn = document.getElementById('logoutBtn');
        const toastContainer = document.getElementById('toastContainer');

        // Stats elements
        const statsSkeleton = document.getElementById('statsSkeleton');
        const statsContent = document.getElementById('statsContent');
        const statRequestsSent = document.getElementById('statRequestsSent');
        const statReviewsReceived = document.getElementById('statReviewsReceived');
        const statConversionRate = document.getElementById('statConversionRate');

        // Table elements
        const tableSkeleton = document.getElementById('tableSkeleton');
        const tableContent = document.getElementById('tableContent');
        const emptyState = document.getElementById('emptyState');

        // =====================================================
        // TOAST NOTIFICATION SYSTEM
        // =====================================================
        function showToast(message, type = 'success') {
            // Create toast element
            const toast = document.createElement('div');
            toast.className = `
                flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg min-w-[300px] max-w-md
                ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white
                slide-down
            `;

            // Icon based on type
            const icon = type === 'success'
                ? `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                   </svg>`
                : `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                   </svg>`;

            toast.innerHTML = `
                ${icon}
                <span class="font-medium">${escapeHtml(message)}</span>
                <button class="ml-auto hover:opacity-80 transition-opacity" onclick="this.parentElement.remove()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            `;

            // Add to container
            toastContainer.appendChild(toast);

            // Auto-dismiss after delay (3s for success, 5s for error)
            const delay = type === 'success' ? 3000 : 5000;
            setTimeout(() => {
                toast.classList.remove('slide-down');
                toast.classList.add('slide-up');
                setTimeout(() => toast.remove(), 300);
            }, delay);
        }

        // =====================================================
        // FORM VALIDATION
        // =====================================================
        function validateForm() {
            let isValid = true;

            // Hide previous errors
            nameError.classList.add('hidden');
            emailError.classList.add('hidden');

            const name = customerNameInput.value.trim();
            const email = customerEmailInput.value.trim();

            if (!name) {
                nameError.querySelector('span').textContent = 'Please enter customer name';
                nameError.classList.remove('hidden');
                isValid = false;
            }

            if (!email) {
                emailError.querySelector('span').textContent = 'Please enter customer email';
                emailError.classList.remove('hidden');
                isValid = false;
            } else if (!isValidEmail(email)) {
                emailError.querySelector('span').textContent = 'Please enter a valid email address';
                emailError.classList.remove('hidden');
                isValid = false;
            }

            return isValid;
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // =====================================================
        // LOAD USER DATA
        // =====================================================
        async function loadUserData() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    const businessName = data.business?.business_name || 'Your Business';
                    headerBusinessName.textContent = businessName;
                    mobileBusinessName.textContent = businessName;
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('business', JSON.stringify(data.business));
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Failed to load user data:', error);
                headerBusinessName.textContent = 'Dashboard';
                mobileBusinessName.textContent = 'Dashboard';
            }
        }

        // =====================================================
        // LOAD DASHBOARD STATS
        // =====================================================
        async function loadDashboardStats() {
            try {
                const response = await fetch(`${API_URL}/dashboard/stats`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                // Hide skeleton, show content
                statsSkeleton.classList.add('hidden');
                statsContent.classList.remove('hidden');

                if (response.ok) {
                    statRequestsSent.textContent = data.total_requests_sent || 0;
                    statReviewsReceived.textContent = data.reviews_received || 0;
                    statConversionRate.textContent = `${data.conversion_rate || 0}%`;
                } else {
                    statRequestsSent.textContent = '0';
                    statReviewsReceived.textContent = '0';
                    statConversionRate.textContent = '0%';
                }
            } catch (error) {
                console.error('Error fetching dashboard stats:', error);
                statsSkeleton.classList.add('hidden');
                statsContent.classList.remove('hidden');
                statRequestsSent.textContent = '0';
                statReviewsReceived.textContent = '0';
                statConversionRate.textContent = '0%';
            }
        }

        // =====================================================
        // LOAD REVIEW REQUESTS
        // =====================================================
        async function loadReviewRequests() {
            try {
                const response = await fetch(`${API_URL}/review-requests`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                // Hide skeleton
                tableSkeleton.classList.add('hidden');

                if (response.ok && data.success) {
                    displayReviewRequests(data.data);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Failed to load review requests:', error);
                tableSkeleton.classList.add('hidden');
                showEmptyState();
            }
        }

        // =====================================================
        // DISPLAY REVIEW REQUESTS
        // =====================================================
        function displayReviewRequests(requests) {
            if (!requests || requests.length === 0) {
                showEmptyState();
                return;
            }

            // Hide empty state, show table
            emptyState.classList.add('hidden');
            tableContent.classList.remove('hidden');
            tableContent.classList.add('fade-in');

            const recentRequests = requests.slice(0, 10);

            requestsTableBody.innerHTML = recentRequests.map((request, index) => `
                <tr class="border-b border-gray-50 ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'} hover:bg-teal-50/50 transition-colors duration-150">
                    <td class="py-4 px-4 md:px-6">
                        <span class="font-medium text-gray-800">${escapeHtml(request.customer_name)}</span>
                    </td>
                    <td class="py-4 px-4 md:px-6 text-gray-600">${escapeHtml(request.customer_email)}</td>
                    <td class="py-4 px-4 md:px-6 text-gray-500 text-sm">${formatDateTime(request.sent_at)}</td>
                    <td class="py-4 px-4 md:px-6">${getStatusBadge(request.status)}</td>
                </tr>
            `).join('');
        }

        function showEmptyState() {
            tableContent.classList.add('hidden');
            emptyState.classList.remove('hidden');
            emptyState.classList.add('fade-in');
        }

        // =====================================================
        // HELPER FUNCTIONS
        // =====================================================
        function formatDateTime(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            }) + ' at ' + date.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        function getStatusBadge(status) {
            const badges = {
                'sent': `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">
                           <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                           Sent
                         </span>`,
                'opened': `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                            Opened
                          </span>`,
                'clicked': `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-purple-100 text-purple-700">
                             <span class="w-1.5 h-1.5 rounded-full bg-purple-500"></span>
                             Clicked
                           </span>`,
                'reviewed': `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">
                              <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                              Reviewed
                            </span>`
            };
            return badges[status] || `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-600">
                                        <span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span>
                                        ${capitalizeFirst(status || 'Unknown')}
                                      </span>`;
        }

        function capitalizeFirst(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // =====================================================
        // SEND REVIEW REQUEST
        // =====================================================
        async function sendReviewRequest(event) {
            event.preventDefault();

            if (!validateForm()) return;

            const customerName = customerNameInput.value.trim();
            const customerEmail = customerEmailInput.value.trim();

            // Show loading state
            sendRequestBtn.disabled = true;
            btnText.textContent = 'Sending...';
            btnIcon.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/review-requests/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        customer_name: customerName,
                        customer_email: customerEmail
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showToast('Review request sent successfully!', 'success');
                    customerNameInput.value = '';
                    customerEmailInput.value = '';
                    loadDashboardStats();
                    loadReviewRequests();
                } else {
                    showToast(data.message || 'Failed to send review request', 'error');
                }
            } catch (error) {
                console.error('Error sending review request:', error);
                showToast('Cannot connect to server. Please try again.', 'error');
            }

            // Reset button state
            sendRequestBtn.disabled = false;
            btnText.textContent = 'Send Review Request';
            btnIcon.classList.remove('hidden');
            btnSpinner.classList.add('hidden');
        }

        // =====================================================
        // LOGOUT
        // =====================================================
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('business');
            window.location.href = 'login.html';
        }

        // =====================================================
        // EVENT LISTENERS
        // =====================================================
        reviewRequestForm.addEventListener('submit', sendReviewRequest);
        logoutBtn.addEventListener('click', logout);

        // =====================================================
        // INITIALIZE
        // =====================================================
        loadUserData();
        loadDashboardStats();
        loadReviewRequests();
    </script>
</body>
</html>
