<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - *revvie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: {
                            500: '#6FCF97',
                            600: '#6FCF97',
                            700: '#5DBF87',
                        },
                        page: '#f8f8f8',
                    },
                    fontFamily: {
                        'display': ['"Atkinson Hyperlegible"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-page min-h-screen flex items-center justify-center p-4">

    <!-- Offline Banner -->
    <div id="offlineBanner" class="fixed top-0 left-0 right-0 z-50 hidden">
        <div class="bg-amber-500 text-white text-center py-2 px-4 text-sm font-medium">
            You're offline. Check your connection.
        </div>
    </div>

    <!-- Main container -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 relative overflow-hidden">
        <!-- Decorative gradient -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-accent-500 to-accent-600"></div>

        <!-- Logo/Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-accent-500 font-display">*revvie</h1>
            <p class="text-gray-500 mt-2">Welcome back!</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">

            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                    Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="you@business.com"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-accent-500 focus:border-accent-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
                <p id="emailError" class="hidden text-red-500 text-sm mt-1.5 flex items-center gap-1">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span></span>
                </p>
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                    Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="Enter your password"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-accent-500 focus:border-accent-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm flex items-start gap-2">
                <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <span id="errorText"></span>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-accent-600 text-white py-3.5 rounded-xl font-semibold hover:bg-accent-700 hover:shadow-lg hover:shadow-accent-500/25 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:shadow-none"
            >
                <span id="btnText">Log In</span>
                <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <!-- Link to Signup -->
        <p class="text-center mt-6 text-gray-600">
            Don't have an account?
            <a href="signup.html" class="text-accent-600 font-semibold hover:underline">
                Sign up
            </a>
        </p>
    </div>

    <script>
        // Dynamic API URL based on environment
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:5001'
            : window.location.origin;  // Use same origin in production
        const API_URL = `${API_BASE_URL}/api`;

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const offlineBanner = document.getElementById('offlineBanner');

        // Network status
        window.addEventListener('online', () => offlineBanner.classList.add('hidden'));
        window.addEventListener('offline', () => offlineBanner.classList.remove('hidden'));
        if (!navigator.onLine) offlineBanner.classList.remove('hidden');

        // Email validation
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        emailInput.addEventListener('blur', () => {
            const emailError = document.getElementById('emailError');
            const email = emailInput.value.trim();
            if (email && !isValidEmail(email)) {
                emailError.querySelector('span').textContent = 'Please enter a valid email';
                emailError.classList.remove('hidden');
                emailInput.classList.add('border-red-400');
            } else {
                emailError.classList.add('hidden');
                emailInput.classList.remove('border-red-400');
            }
        });

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            // Check network
            if (!navigator.onLine) {
                showError('You are offline. Check your connection.');
                return;
            }

            errorDiv.classList.add('hidden');
            btnText.textContent = 'Logging in...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validate email format
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                resetButton();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.session.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    btnText.textContent = 'Success!';
                    const redirect = data.redirect || '/dashboard';
                    setTimeout(() => window.location.href = redirect, 500);
                } else {
                    showError(data.error || 'Invalid email or password. Please try again.');
                    form.classList.add('shake');
                    setTimeout(() => form.classList.remove('shake'), 300);
                    resetButton();
                }
            } catch (error) {
                showError('Cannot connect to server. Please try again later.');
                console.error('Login error:', error);
                resetButton();
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function resetButton() {
            btnText.textContent = 'Log In';
            btnSpinner.classList.add('hidden');
            submitBtn.disabled = false;
        }

        // If user is already logged in, redirect appropriately
        if (localStorage.getItem('token')) {
            const biz = JSON.parse(localStorage.getItem('business') || '{}');
            if (biz.google_place_id) {
                window.location.href = '/dashboard';
            } else {
                window.location.href = '/onboarding';
            }
        }
    </script>
</body>
</html>
