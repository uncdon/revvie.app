<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Revvie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Offline Banner -->
    <div id="offlineBanner" class="fixed top-0 left-0 right-0 z-50 hidden">
        <div class="bg-amber-500 text-white text-center py-2 px-4 text-sm font-medium">
            You're offline. Check your connection.
        </div>
    </div>

    <!-- Main container -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 relative overflow-hidden">
        <!-- Decorative gradient -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-teal-500 to-teal-600"></div>

        <!-- Logo/Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-teal-600">Revvie</h1>
            <p class="text-gray-500 mt-2">Review Automation Made Simple</p>
        </div>

        <!-- Signup Form -->
        <form id="signupForm" class="space-y-5">

            <!-- Business Name Field -->
            <div>
                <label for="businessName" class="block text-sm font-semibold text-gray-700 mb-2">
                    Business Name <span class="text-red-400">*</span>
                </label>
                <input
                    type="text"
                    id="businessName"
                    name="businessName"
                    required
                    placeholder="Joe's Coffee Shop"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
            </div>

            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                    Email Address <span class="text-red-400">*</span>
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="you@business.com"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
                <p id="emailError" class="hidden text-red-500 text-sm mt-1.5 flex items-center gap-1">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span></span>
                </p>
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                    Password <span class="text-red-400">*</span>
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="6"
                    placeholder="At least 6 characters"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
                <p id="passwordHint" class="text-xs text-gray-400 mt-1.5">Minimum 6 characters</p>
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm flex items-start gap-2">
                <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <span id="errorText"></span>
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-teal-600 text-white py-3.5 rounded-xl font-semibold hover:bg-teal-700 hover:shadow-lg hover:shadow-teal-500/25 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:shadow-none"
            >
                <span id="btnText">Create Account</span>
                <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <!-- Link to Login -->
        <p class="text-center mt-6 text-gray-600">
            Already have an account?
            <a href="login.html" class="text-teal-600 font-semibold hover:underline">
                Log in
            </a>
        </p>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';

        const form = document.getElementById('signupForm');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const offlineBanner = document.getElementById('offlineBanner');

        // Network status
        window.addEventListener('online', () => offlineBanner.classList.add('hidden'));
        window.addEventListener('offline', () => offlineBanner.classList.remove('hidden'));
        if (!navigator.onLine) offlineBanner.classList.remove('hidden');

        // Email validation
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        emailInput.addEventListener('blur', () => {
            const emailError = document.getElementById('emailError');
            const email = emailInput.value.trim();
            if (email && !isValidEmail(email)) {
                emailError.querySelector('span').textContent = 'Please enter a valid email';
                emailError.classList.remove('hidden');
                emailInput.classList.add('border-red-400');
            } else {
                emailError.classList.add('hidden');
                emailInput.classList.remove('border-red-400');
            }
        });

        // Password validation visual feedback
        passwordInput.addEventListener('input', () => {
            const hint = document.getElementById('passwordHint');
            if (passwordInput.value.length >= 6) {
                hint.textContent = 'Password strength: Good';
                hint.classList.remove('text-gray-400');
                hint.classList.add('text-green-500');
            } else {
                hint.textContent = 'Minimum 6 characters';
                hint.classList.remove('text-green-500');
                hint.classList.add('text-gray-400');
            }
        });

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            if (!navigator.onLine) {
                showError('You are offline. Check your connection.');
                return;
            }

            errorDiv.classList.add('hidden');
            btnText.textContent = 'Creating Account...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            const businessName = document.getElementById('businessName').value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validate
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                resetButton();
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                resetButton();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        business_name: businessName
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.session && data.session.access_token) {
                        localStorage.setItem('token', data.session.access_token);
                    }
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('business', JSON.stringify(data.business));
                    btnText.textContent = 'Success!';
                    setTimeout(() => window.location.href = 'dashboard.html', 500);
                } else {
                    showError(data.error || 'Signup failed. Please try again.');
                    form.classList.add('shake');
                    setTimeout(() => form.classList.remove('shake'), 300);
                    resetButton();
                }
            } catch (error) {
                showError('Cannot connect to server. Please try again later.');
                console.error('Signup error:', error);
                resetButton();
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function resetButton() {
            btnText.textContent = 'Create Account';
            btnSpinner.classList.add('hidden');
            submitBtn.disabled = false;
        }
    </script>
</body>
</html>
