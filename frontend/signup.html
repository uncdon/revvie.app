<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Revvie</title>
    <!-- Tailwind CSS from CDN (no installation needed) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Main container - centered card -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">

        <!-- Logo/Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600">Revvie</h1>
            <p class="text-gray-500 mt-2">Review Automation Made Simple</p>
        </div>

        <!-- Signup Form -->
        <form id="signupForm" class="space-y-6">

            <!-- Business Name Field -->
            <div>
                <label for="businessName" class="block text-sm font-medium text-gray-700 mb-1">
                    Business Name
                </label>
                <input
                    type="text"
                    id="businessName"
                    name="businessName"
                    required
                    placeholder="Joe's Coffee Shop"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                >
            </div>

            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email Address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="you@business.com"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                >
            </div>

            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="6"
                    placeholder="At least 6 characters"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                >
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMessage" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-200"
            >
                Create Account
            </button>
        </form>

        <!-- Link to Login -->
        <p class="text-center mt-6 text-gray-600">
            Already have an account?
            <a href="login.html" class="text-indigo-600 font-semibold hover:underline">
                Log in
            </a>
        </p>
    </div>

    <!-- JavaScript - Handles form submission -->
    <script>
        // =====================================================
        // JAVASCRIPT EXPLANATION FOR BEGINNERS
        // =====================================================
        // This script does the following:
        // 1. Listens for form submission
        // 2. Prevents the default page reload
        // 3. Gets the values from the form fields
        // 4. Sends them to our Flask API
        // 5. If successful: saves the token and redirects
        // 6. If error: shows the error message
        // =====================================================

        // API base URL - change this if your server runs on a different port
        const API_URL = 'http://localhost:5001/api';

        // Get references to HTML elements we'll need
        const form = document.getElementById('signupForm');
        const errorDiv = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        // Listen for form submission
        form.addEventListener('submit', async function(event) {
            // Prevent the browser from reloading the page
            event.preventDefault();

            // Hide any previous error messages
            errorDiv.classList.add('hidden');

            // Show loading state on button
            submitBtn.textContent = 'Creating Account...';
            submitBtn.disabled = true;

            // Get values from form fields
            const businessName = document.getElementById('businessName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Send POST request to our signup API
                // fetch() is the modern way to make HTTP requests in JavaScript
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',  // HTTP method
                    headers: {
                        'Content-Type': 'application/json'  // Tell server we're sending JSON
                    },
                    body: JSON.stringify({  // Convert JavaScript object to JSON string
                        email: email,
                        password: password,
                        business_name: businessName
                    })
                });

                // Parse the JSON response
                const data = await response.json();

                // Check if signup was successful (status code 201 = created)
                if (response.ok) {
                    // SUCCESS! Save the token to localStorage
                    // localStorage persists even after browser is closed
                    if (data.session && data.session.access_token) {
                        localStorage.setItem('token', data.session.access_token);
                    }

                    // Save user info too (useful for displaying later)
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('business', JSON.stringify(data.business));

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // ERROR - show the error message from server
                    showError(data.error || 'Signup failed. Please try again.');
                }
            } catch (error) {
                // Network error (server not running, no internet, etc.)
                showError('Cannot connect to server. Make sure the Flask server is running.');
                console.error('Signup error:', error);
            }

            // Reset button state
            submitBtn.textContent = 'Create Account';
            submitBtn.disabled = false;
        });

        // Helper function to show error messages
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
