<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Revvie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#07B5F5',
                            600: '#07B5F5',
                            700: '#0599D1',
                        },
                        accent: {
                            500: '#6FCF97',
                            600: '#6FCF97',
                            700: '#5DBF87',
                        },
                        page: '#f8f8f8',
                    },
                    fontFamily: {
                        'display': ['"Atkinson Hyperlegible"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Atkinson Hyperlegible', sans-serif; }
    </style>
</head>
<body class="bg-page min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 relative overflow-hidden">
        <!-- Decorative gradient -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary-500 to-accent-500"></div>

        <!-- Logo/Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-primary-500" style="font-family: 'Young Serif', serif;">*revvie</h1>
            <h2 class="text-xl font-bold text-gray-900 mt-2">Set a new password</h2>
            <p class="text-gray-500 mt-2 text-sm">Enter your new password below.</p>
        </div>

        <!-- Form -->
        <form id="resetForm" class="space-y-5">
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                    New Password
                </label>
                <input
                    type="password"
                    id="password"
                    required
                    minlength="8"
                    placeholder="At least 8 characters"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-2">
                    Confirm Password
                </label>
                <input
                    type="password"
                    id="confirmPassword"
                    required
                    minlength="8"
                    placeholder="Re-enter your new password"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 focus:bg-white outline-none transition-all duration-200 placeholder-gray-400"
                >
            </div>

            <!-- Error -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm flex items-start gap-2">
                <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <span id="errorText"></span>
            </div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-primary-600 text-white py-3.5 rounded-xl font-semibold hover:bg-primary-700 hover:shadow-lg hover:shadow-primary-500/25 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
            >
                <span id="btnText">Reset Password</span>
                <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600 text-sm">
            <a href="/login" class="text-primary-600 font-semibold hover:underline">← Back to login</a>
        </p>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:5001'
            : window.location.origin;
        const API_URL = `${API_BASE_URL}/api`;

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        function showError(msg) {
            errorText.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        // No token in URL — show error immediately and hide form
        if (!token) {
            showError('Invalid reset link. Please request a new password reset.');
            form.classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            errorDiv.classList.add('hidden');

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            btnText.textContent = 'Resetting...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password }),
                });
                const data = await res.json();

                if (res.ok) {
                    document.querySelector('.bg-white').innerHTML = `
                        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary-500 to-accent-500"></div>
                        <div class="text-center py-8">
                            <div class="text-5xl mb-4">✅</div>
                            <h2 class="text-2xl font-bold text-gray-900 mb-2">Password reset!</h2>
                            <p class="text-gray-500 mb-6">Redirecting you to login...</p>
                        </div>`;
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showError(data.error || 'Something went wrong. Please try again.');
                    btnText.textContent = 'Reset Password';
                    btnSpinner.classList.add('hidden');
                    submitBtn.disabled = false;
                }
            } catch {
                showError('Network error. Please try again.');
                btnText.textContent = 'Reset Password';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
